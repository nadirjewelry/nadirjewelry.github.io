  content: '';

  bottom: 0;

  height: 0; /* Starts as completely down/hidden */
  background: linear-gradient(to top, blue, purple); /* Color fill gradient */
  transition: height 2s ease-in-out; /* Slow motion animation */
  z-index: -1; /* Place the fill behind the text outline effect */

  -webkit-background-clip: text; 
  background-clip: text;
  -webkit-text-fill-color: transparent; 
}

.animated-text:hover::before {
