/**
 * detect IE
 * returns version of IE or false, if browser is not Internet Explorer
 */
function detectIE() {
  var ua = window.navigator.userAgent;

  // Test values; Uncomment to check result …

  // IE 10
  // ua = 'Mozilla/5.0 (compatible; MSIE 10.0; Windows NT 6.2; Trident/6.0)';

  // IE 11
  // ua = 'Mozilla/5.0 (Windows NT 6.3; Trident/7.0; rv:11.0) like Gecko';

  // Edge 12 (Spartan)
  // ua = 'Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/39.0.2171.71 Safari/537.36 Edge/12.0';

  // Edge 13
  // ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/46.0.2486.0 Safari/537.36 Edge/13.10586';

  var msie = ua.indexOf('MSIE ');
  if (msie > 0) {
    // IE 10 or older => return version number
    return parseInt(ua.substring(msie + 5, ua.indexOf('.', msie)), 10);
  }

  var trident = ua.indexOf('Trident/');
  if (trident > 0) {
    // IE 11 => return version number
    var rv = ua.indexOf('rv:');
    return parseInt(ua.substring(rv + 3, ua.indexOf('.', rv)), 10);
  }

  var edge = ua.indexOf('Edge/');
  if (edge > 0) {
    // Edge (IE 12+) => return version number
    return parseInt(ua.substring(edge + 5, ua.indexOf('.', edge)), 10);
  }

  // other browser
  return false;
}

    <script>
const defaultItemCount = 7;
const itemWidth = 130;

const wrapper = document.getElementById("InfiniteScrollWrapper");
const content = document.getElementById("InfiniteScroll");

const manageChildren = childCount => {
  while (content.children.length > defaultItemCount) {if (window.CP.shouldStopExecution(0)) break;
    content.removeChild(content.lastChild);
  }window.CP.exitedLoop(0);

  for (let i = 0; i < childCount; i++) {if (window.CP.shouldStopExecution(1)) break;
    for (let j = 0; j < defaultItemCount; j++) {if (window.CP.shouldStopExecution(2)) break;
      const clone = content.children[j].cloneNode(true);
      content.appendChild(clone);
    }window.CP.exitedLoop(2);
  }window.CP.exitedLoop(1);

  content.style.width = `${itemWidth * defaultItemCount * (childCount + 1)}px`;
};

const core = width => {
  if (width <= 1920) {
    manageChildren(2);
  } else if (width <= 2560) {
    manageChildren(3);
  } else if (width <= 3840) {
    manageChildren(4);
  } else {
    manageChildren(8);
  }
};

const debounce = (func, delay) => {
  let timeout;
  return () => {
    clearTimeout(timeout);
    timeout = setTimeout(func, delay);
  };
};

const handleResize = debounce(() => core(window.innerWidth), 600);

window.addEventListener("load", () => {
  core(window.innerWidth);
});

window.addEventListener("resize", handleResize);
