.grid {
	position: relative;

/* Common style */
.grid figure {
	position: relative;
	float: left;

	max-height: 360px;
	width: 48%;

	text-align: center;

}

.grid figure img {
	position: relative;
	display: block;
	min-height: 100%;

	opacity: 0.8;
}

.grid figure figcaption {
	padding: 2em;
	color: #fff;

	font-size: 1.25em;
	-webkit-backface-visibility: hidden;
	backface-visibility: hidden;
}

.grid figure figcaption::before,
.grid figure figcaption::after {
	pointer-events: none;
}

.grid figure figcaption,
.grid figure figcaption > a {
	position: absolute;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
}

/* Anchor will cover the whole item by default */

	z-index: 1000;
