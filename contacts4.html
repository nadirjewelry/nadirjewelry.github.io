    <script>
const cardContainer = document.querySelector('.card-container');
const card = document.querySelector('.card');
const maxRotation = 15; // Maximum rotation in degrees

cardContainer.addEventListener('mousemove', (e) => {
    const { offsetWidth: width, offsetHeight: height } = cardContainer;
    const { offsetX: x, offsetY: y } = e;

    // Calculate rotation values based on mouse position
    const rotateY = (x / width - 0.5) * (maxRotation * 2);
    const rotateX = (0.5 - y / height) * (maxRotation * 2);

    // Apply the 3D transform
    card.style.transform = `scale(1.05) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

cardContainer.addEventListener('mouseleave', () => {
    // Reset the transform when the mouse leaves the container
    card.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
});

  </script>
